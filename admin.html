<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - DGEP CMC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        #login-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .admin-card { max-width: 1200px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid #dc3545; }
    </style>
</head>
<body>

<div id="login-gate">
    <div class="p-5 border rounded-4 bg-white shadow-sm" style="max-width: 400px;">
        <img src="brasao_cmc.png" width="100" class="mb-4">
        <h4 class="fw-bold">DGEP - Gestão de Pessoas</h4>
        <p class="text-muted small mb-4">Área Restrita para Administradores</p>
        <div id="buttonDiv"></div>
    </div>
</div>

<div class="container" id="admin-app" style="display:none;">
    <div class="admin-card">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-danger fw-bold"><i class="bi bi-shield-lock"></i> Processamento de Nomeações</h3>
            <div class="text-end">
                <span id="user-tag" class="badge bg-dark mb-1 d-block"></span>
                <button class="btn btn-outline-secondary btn-sm" onclick="buscarDados()">Atualizar Lista</button>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr><th>Protocolo</th><th>Vereador</th><th>Nomeado</th><th>Status</th><th>Ações</th></tr>
                </thead>
                <tbody id="lista-admin"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyHtQvVUKssbP2pZNAj7IVrVtPfn9t8uVNtzc_EmIdbtv7q4az8eCacDO1Akc6gm1TsWw/exec";

    window.onload = function () {
        google.accounts.id.initialize({
            client_id: "1093227389780-3scrr45lmsdjgkr670ti1q1dolr4h5oq.apps.googleusercontent.com",
            callback: handleAdminLogin
        });
        google.accounts.id.renderButton(document.getElementById("buttonDiv"), { size: "large", width: 300 });
    }

    async function handleAdminLogin(r) {
        // Decodificação robusta
        const payload = JSON.parse(atob(r.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
        const emailLogado = payload.email.toLowerCase().trim();

        try {
            const resp = await fetch(GAS_URL + "?path=getAdmins");
            const admins = await resp.json();

            // O pulo do gato: logar no console para você conferir se houver erro
            console.log("E-mail Logado:", emailLogado);
            console.log("Lista de Admins na Planilha:", admins);

            if (admins.includes(emailLogado)) {
                document.getElementById('login-gate').style.display = 'none';
                document.getElementById('admin-app').style.display = 'block';
                document.getElementById('user-tag').innerText = emailLogado;
                buscarDados();
            } else {
                alert("ACESSO NEGADO\nO e-mail " + emailLogado + " não está na lista de administradores da planilha DGEP.");
            }
        } catch (e) {
            alert("Erro de conexão com o banco de dados.");
        }
    }

    async function buscarDados() {
        const b = document.getElementById('lista-admin');
        b.innerHTML = "<tr><td colspan='5' class='text-center p-5'>Carregando...</td></tr>";
        fetch(GAS_URL).then(res => res.json()).then(data => {
            b.innerHTML = "";
            data.forEach(r => {
                const sBadge = r[8] === "Aprovado" ? "bg-success" : (r[8] === "Recusado" ? "bg-danger" : "bg-warning text-dark");
                b.innerHTML += `<tr>
                    <td><small class="fw-bold">${r[0]}</small></td>
                    <td>${r[2]}</td>
                    <td><b>${r[3]}</b></td>
                    <td><span class="badge ${sBadge}">${r[8]}</span></td>
                    <td>
                        <button class="btn btn-sm btn-success" onclick="mudarStatus('${r[0]}','Aprovado')">Aprovar</button>
                        <button class="btn btn-sm btn-danger" onclick="mudarStatus('${r[0]}','Recusado')">Negar</button>
                    </td>
                </tr>`;
            });
        });
    }

    async function mudarStatus(id, st) {
        const obs = prompt("Parecer da Diretoria de Gestão de Pessoas:");
        if (obs !== null) {
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "atualizar", protocolo: id, novoStatus: st, obs: obs }) });
            buscarDados();
        }
    }
</script>
</body>
</html>
